# Integration test harness for terraform-provider-omni.
#
# Brings up a throwaway Omni instance configured with its native OIDC auth provider pointed at a
# mock OIDC server (https://docs.siderolabs.com/omni/reference/omni-configuration#auth-oidc), so no
# external identity provider is required. Omni performs OIDC discovery against the provider URL at
# startup, which the mock server satisfies. The acceptance tests then authenticate with the
# bootstrapped service-account key (PGP-signed), so no interactive OIDC login ever happens.
#
# The etcd encryption private key is read from a checked-in throwaway PGP key via the file://
# private-key-source, so no Vault is needed either.

services:
  dex:
    image: dexidp/dex:v2.41.1
    container_name: dex
    ports:
      - "8080:8080"
    volumes:
      - ./dex.yaml:/etc/dex/config.yaml
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/dex/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - omni-test

  omni:
    image: ghcr.io/siderolabs/omni:${OMNI_VERSION:-latest}
    restart: on-failure
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ./certs:/certs:ro
      # Rendered from omni-config.yaml.tmpl by run.sh / run-qemu.sh (see that file for details).
      - ./omni-config.yaml:/etc/omni/config.yaml:ro
      - omni-out:/_out
    ports:
      - "${OMNI_HOST_PORT:-8099}:8099"
      - "8090:8090"
      - "50180:50180/udp"
    command:
      - --config-path=/etc/omni/config.yaml
    networks:
      - omni-test
    depends_on:
      dex:
        condition: service_healthy

volumes:
  omni-out:

networks:
  omni-test:
    driver: bridge
